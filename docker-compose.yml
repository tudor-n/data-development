services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clarifi}
      POSTGRES_USER: ${POSTGRES_USER:-clarifi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clarifi} -d ${POSTGRES_DB:-clarifi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clarifi}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-clarifi}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}           # optional — LLM degrades gracefully
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal

  # ── React frontend (served by nginx) ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}   # leave empty — nginx proxies /api/ internally
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
